name: llm-statistics
parent: composer
categories:
  - AI
author: Tetrate
description: Collect metrics and structured logs for LLM API requests and responses
longDescription: |
  An HTTP filter plugin that inspects well-known LLM API traffic and emits
  observability signals for request and response processing.

  The plugin supports OpenAI Chat Completions and Anthropic Messages APIs,
  including both non-streaming JSON responses and streaming SSE responses.

  ## Key Features

  - **LLM request detection**: Recognizes OpenAI and Anthropic API paths out of the box
  - **Token usage metrics**: Records input, output, and total token counters
  - **Latency metrics**: Records request duration and time-to-first-token for streaming
  - **Structured logs**: Emits a compact JSON log entry with model, token counts, durations,
    and optional session ID
  - **Dynamic metadata**: Writes extracted observability fields to Envoy filter metadata

  ## Configuration Fields

  | Field | Type | Required | Default | Description |
  |-------|------|----------|---------|-------------|
  | `metadata_namespace` | string | no | `io.builtonenvoy.llm-statistics` | Filter metadata namespace |
  | `use_default_attributes` | bool | no | `false` | Emit the full built-in structured log payload |
  | `use_default_response_attributes` | bool | no | `false` | Emit the default lightweight structured log payload |
  | `session_id_header` | string | no | `""` | Optional header name used to extract a conversation/session ID |

  ## Dynamic Metadata

  By default the plugin writes values under the namespace `io.builtonenvoy.llm-statistics`.
  These fields can be consumed by downstream filters or access logs.

  Common keys include:

  - `kind`
  - `model`
  - `response_type`
  - `session_id`
  - `question`
  - `system`
  - `answer`
  - `reasoning`
  - `tool_calls`
  - `input_token`
  - `output_token`
  - `total_token`
  - `reasoning_tokens`
  - `cached_tokens`
  - `input_token_details`
  - `output_token_details`
  - `llm_service_duration_ms`
  - `llm_first_token_duration_ms`

  ## Access Log Example

  The default `boe run` access log does not print dynamic metadata. To inspect
  these values, export the generated config and customize the access log formatter
  to use Envoy's `DYNAMIC_METADATA(namespace:key)` formatter.
type: go
featured: true
tags:
  - go
  - http
  - ai
  - llm
  - observability
  - metrics
  - logging
license: Apache-2.0
examples:
  - title: Lightweight LLM observability
    description: |
      Record lightweight LLM metrics and emit a structured log entry with model,
      token counts, and latency information.
    code: |
      boe run --extension llm-statistics --config '{
        "use_default_response_attributes": true,
        "session_id_header": "x-session-id"
      }'
  - title: Full built-in attributes
    description: |
      Emit the full built-in attribute set, including `question`, `system`,
      `answer`, `reasoning`, `tool_calls`, and token detail fields.
    code: |
      boe run --extension llm-statistics --config '{
        "use_default_attributes": true,
        "session_id_header": "x-session-id"
      }'
  - title: Export config and customize access logs
    description: |
      Export the generated Envoy config, then replace the default access log with
      a `typed_json_format` logger that reads values from
      `io.builtonenvoy.llm-statistics` via `%DYNAMIC_METADATA(...)%`.
    code: |
      boe gen-config \
        --local ./extensions/composer/llm-statistics \
        --config '{"use_default_attributes": true, "session_id_header": "x-session-id"}' \
        --output /tmp/boe-export

      # Edit /tmp/boe-export/envoy.yaml and replace the access log with:
      #
      # access_log:
      #   - name: envoy.access_loggers.stdout
      #     typed_config:
      #       "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
      #       log_format:
      #         typed_json_format:
      #           llm_kind: "%DYNAMIC_METADATA(io.builtonenvoy.llm-statistics:kind)%"
      #           llm_model: "%DYNAMIC_METADATA(io.builtonenvoy.llm-statistics:model)%"
      #           llm_question: "%DYNAMIC_METADATA(io.builtonenvoy.llm-statistics:question)%"
      #           llm_tool_calls: "%DYNAMIC_METADATA(io.builtonenvoy.llm-statistics:tool_calls)%"
